<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Last Bell</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: Georgia, serif;
      background: #f5f0e8;
    }

@font-face {
  font-family: 'Vrdznagir';
  src: url('Vrdznagir.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
}

    #introScreen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      height: 100%;
      background: #f5f0e8;
    }

    /* ═══ MARQUEE ═══ */
    .marquee-wrapper {
      flex-shrink: 0;
      overflow: hidden;
      padding: 10px 0;
      background: rgba(180,160,130,0.4);
      border-bottom: 1px solid rgba(150,120,80,0.3);
    }
    .marquee-wrapper.bottom-bar {
      border-bottom: none;
      border-top: 1px solid rgba(150,120,80,0.3);
    }
    .marquee-track {
      display: inline-flex;
      gap: 20px;
     word-spacing: 5px;
      white-space: nowrap;
      animation: marquee-scroll 10s linear infinite;
    }
  .marquee-track span {
    font-family: 'Vrdznagir', cursive; /* լոկալ ֆոնտ + fallback */
    font-size: 1.4em;                  /* վրձնագիր տեսք */
    color: #5a3e28;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.2); /* թեթև ստվեր, ինչպես ներկով գրված */
  }
    @keyframes marquee-scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ═══ IMAGES AREA ═══ */
    .images-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      min-height: 0;
    }

    .photo {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #f5f0e8;
    }

    .photo img {
      width: 200%;
      height: 120%;
      object-fit: contain;
      display: block;
    }

    .photo-gap {
      height: 80px;
      flex-shrink: 0;
      background: #f5f0e8;
      position: relative;
    }

    /* ═══ BELL ═══ */
    .bell-wrap {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0);
      z-index: 10;
      cursor: pointer;
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .bell-wrap.visible {
      transform: translate(-50%, -50%) scale(1);
    }
    .bell-wrap img {
      width: 70px;
      height: 70px;
      filter: drop-shadow(0 0 12px rgba(180,140,60,0.7));
    }
    .bell-wrap.ringing img {
      animation: bell-swing 0.4s ease-in-out infinite alternate;
    }
    @keyframes bell-swing {
      0%   { transform: rotate(-18deg); }
      100% { transform: rotate(18deg); }
    }

    /* ═══ MAIN CONTENT ═══ */
    #mainContent {
      display: none;
      position: fixed;
      inset: 0;
      overflow-y: auto;
      background: #f5f0e8;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    #mainContent.active  { display: block; }
    #mainContent.visible { opacity: 1; }
  </style>
</head>
<body>

  <div id="introScreen">

<div class="marquee-wrapper">
  <div class="marquee-track">
    <span>Ու հնչեց զանգը, հնչեց</span> <span>🎓</span>
    <span>Ու հնչեց զանգը, հնչեց</span> <span>🎓</span>
    <span>Ու հնչեց զանգը, հնչեց</span> <span>🎓</span>
    <span>Ու հնչեց զանգը, հնչեց</span> <span>🎓</span>
  </div>
</div>

    <div class="images-area">

      <div class="photo">
        <img src="dasaran.png" alt="photo 1">
      </div>

      <div class="photo-gap">
        <div class="bell-wrap" id="bellWrap">
          <img src="zang.png" alt="bell">
        </div>
      </div>

      <div class="photo">
        <img src="2.png" alt="photo 2">
      </div>

    </div>

    <div class="marquee-wrapper bottom-bar">
  <div class="marquee-track">
    <span>Ու հնչեց զանգը, հնչեց</span> <span>🎓</span>
    <span>Ու հնչեց զանգը, հնչեց</span> <span>🎓</span>
    <span>Ու հնչեց զանգը, հնչեց</span> <span>🎓</span>
    <span>Ու հնչեց զանգը, հնչեց</span> <span>🎓</span>
  </div>
    </div>

  </div>

  <div id="mainContent">
    <h1 style="text-align:center; padding: 60px 20px;">Վերջին զանգ 🎉</h1>
  </div>

  <script>
    const bellWrap    = document.getElementById('bellWrap');
    const introScreen = document.getElementById('introScreen');
    const mainContent = document.getElementById('mainContent');

    setTimeout(() => {
      bellWrap.classList.add('visible');
      setTimeout(() => bellWrap.classList.add('ringing'), 700);
    }, 600);

    bellWrap.addEventListener('click', () => {
      introScreen.style.transition = 'opacity 0.6s ease';
      introScreen.style.opacity = '0';
      introScreen.style.pointerEvents = 'none';
      mainContent.classList.add('active');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => mainContent.classList.add('visible'));
      });
      setTimeout(() => introScreen.style.display = 'none', 600);
    });
  </script>
</body>
</html>
